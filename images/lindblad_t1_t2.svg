<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Lindblad equation thumbnail</title>
  <desc id="desc">A Bloch sphere with T1 and T2 decay curves.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="sphere" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="640" height="420" rx="24" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="246" cy="212" r="120" fill="url(#sphere)" stroke="#0369a1" stroke-width="5"/>
    <ellipse cx="246" cy="212" rx="120" ry="36" fill="none" stroke="#38bdf8" stroke-width="4"/>
    <ellipse cx="246" cy="212" rx="42" ry="120" fill="none" stroke="#7dd3fc" stroke-width="3"/>
    <line x1="246" y1="86" x2="246" y2="338" stroke="#0f172a" stroke-width="3"/>
    <line x1="120" y1="212" x2="372" y2="212" stroke="#0f172a" stroke-width="3"/>
    <path d="M246 212 C274 170 300 148 330 126" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
    <path d="M246 212 C215 204 188 194 164 174" fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 12"/>
    <circle cx="330" cy="126" r="9" fill="#ef4444"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#0f172a">
    <text x="428" y="126" font-size="42" font-weight="700">T1</text>
    <text x="428" y="174" font-size="22" fill="#475569">energy relaxation</text>
    <text x="428" y="250" font-size="42" font-weight="700">T2</text>
    <text x="428" y="298" font-size="22" fill="#475569">phase decay</text>
    <text x="74" y="368" font-size="28" font-weight="700" fill="#0369a1">Lindblad dynamics</text>
  </g>
</svg>
